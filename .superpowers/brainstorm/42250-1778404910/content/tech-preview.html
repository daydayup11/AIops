<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>科技风预览</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1a2e; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #e2e8f0; }

  .app { display: flex; flex-direction: column; height: 100vh; }

  /* Header */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 20px;
    background: #0d1117;
    border-bottom: 1px solid #1e3a5f;
    box-shadow: 0 1px 12px rgba(0,180,255,0.08);
  }
  .header-left { display: flex; align-items: center; gap: 8px; }
  .header-logo { color: #00d4ff; font-size: 16px; }
  .header-title {
    font-size: 13px; font-weight: 600; color: #7dd3fc;
    letter-spacing: 1.5px; text-transform: uppercase;
  }
  .header-right { display: flex; gap: 6px; }
  .icon-btn {
    width: 30px; height: 30px; background: transparent;
    border: 1px solid #1e3a5f; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    color: #4a7fa5; cursor: pointer; font-size: 13px;
    transition: all 0.2s;
  }
  .icon-btn.active { border-color: #00d4ff44; color: #00d4ff; background: #00d4ff08; }
  .icon-btn:hover { border-color: #2a5f85; color: #7eb8d4; }

  /* Body */
  .body { display: flex; flex: 1; overflow: hidden; }

  /* Sidebar */
  .sidebar {
    width: 220px; background: #0d1117; border-right: 1px solid #1e3a5f;
    display: flex; flex-direction: column;
  }
  .sidebar-top { padding: 12px; border-bottom: 1px solid #1e3a5f; }
  .new-btn {
    width: 100%; padding: 7px 12px; background: transparent;
    border: 1px solid #1e3a5f; border-radius: 6px;
    color: #4a7fa5; font-size: 13px; cursor: pointer;
    display: flex; align-items: center; gap: 6px;
    transition: all 0.2s;
  }
  .new-btn:hover { border-color: #2a5f85; color: #7eb8d4; background: #0d1f3a; }
  .session-list { flex: 1; overflow-y: auto; padding: 6px 0; }
  .session-item {
    padding: 8px 12px; cursor: pointer; border-left: 2px solid transparent;
    transition: all 0.15s;
  }
  .session-item.active {
    border-left-color: #00d4ff;
    background: rgba(0, 212, 255, 0.06);
  }
  .session-item:not(.active):hover { background: rgba(30, 58, 95, 0.4); }
  .session-title { font-size: 12px; font-weight: 500; color: #7eb8d4; truncate: ellipsis; white-space: nowrap; overflow: hidden; }
  .session-item.active .session-title { color: #00d4ff; }
  .session-time { font-size: 10px; color: #2a5f85; margin-top: 2px; }
  .session-item:not(.active) .session-title { color: #4a7fa5; }

  /* Main */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* Chat area */
  .chat {
    flex: 1; overflow-y: auto; padding: 20px;
    display: flex; flex-direction: column; gap: 14px;
    background: #0a0e1a;
    background-image: radial-gradient(ellipse at 70% 10%, rgba(0,212,255,0.04) 0%, transparent 50%);
  }

  /* User message */
  .msg-user { display: flex; justify-content: flex-end; }
  .bubble-user {
    background: linear-gradient(135deg, #0066cc, #0044aa);
    border: 1px solid #0088ff44;
    color: #e2f4ff;
    border-radius: 16px 16px 4px 16px;
    padding: 10px 16px; max-width: 420px;
    font-size: 13px; line-height: 1.6;
    box-shadow: 0 2px 8px rgba(0,100,200,0.3);
  }

  /* Progress */
  .msg-progress { display: flex; align-items: center; gap: 8px; padding: 2px 4px; }
  .spinner {
    width: 14px; height: 14px;
    border: 2px solid #1e3a5f;
    border-top-color: #00d4ff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .progress-text { font-size: 12px; color: #2a5f85; }

  /* Result card */
  .result-card {
    background: #0d1422;
    border: 1px solid #1e3a5f;
    border-radius: 10px; padding: 16px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.4);
  }
  .chart-label { font-size: 10px; color: #2a5f85; letter-spacing: 1.5px; margin-bottom: 10px; text-transform: uppercase; }
  /* Fake chart */
  .fake-chart { display: flex; align-items: flex-end; gap: 5px; height: 100px; padding: 0 4px; }
  .bar { flex: 1; border-radius: 3px 3px 0 0; background: linear-gradient(to top, #0088cc, #005588); }
  .bar:nth-child(2) { background: linear-gradient(to top, #0099dd, #006699); }
  .bar:nth-child(4) { background: linear-gradient(to top, #00aaee, #007799); }
  .chart-axis { height: 1px; background: linear-gradient(to right, transparent, #1e3a5f80, transparent); margin: 4px 0 8px; }
  .chart-labels { display: flex; gap: 5px; }
  .chart-label-x { flex: 1; text-align: center; font-size: 9px; color: #2a5f85; }
  .insight-text { font-size: 12px; color: #4a7fa5; margin-bottom: 10px; line-height: 1.5; }

  /* Clarify */
  .msg-assistant { display: flex; justify-content: flex-start; }
  .bubble-assistant {
    background: #0d1422; border: 1px solid #1e3a5f;
    color: #a0c4d8; border-radius: 16px 16px 16px 4px;
    padding: 10px 16px; max-width: 420px;
    font-size: 13px; line-height: 1.6;
  }

  /* Input bar */
  .input-bar {
    padding: 12px 20px;
    background: #0d1117;
    border-top: 1px solid #1e3a5f;
    display: flex; gap: 10px; align-items: center;
  }
  .input-wrap { flex: 1; position: relative; }
  .input-field {
    width: 100%; padding: 8px 14px;
    background: #0a0e1a; border: 1px solid #1e3a5f;
    border-radius: 8px; color: #7eb8d4; font-size: 13px;
    outline: none; transition: border-color 0.2s;
  }
  .input-field::placeholder { color: #2a5f85; }
  .input-field:focus { border-color: #00d4ff44; box-shadow: 0 0 0 2px rgba(0,212,255,0.08); }
  .send-btn {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, #0066cc, #004499);
    border: 1px solid #0088ff44;
    border-radius: 8px; color: #7dd3fc;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 15px;
    box-shadow: 0 2px 8px rgba(0,100,200,0.3);
    transition: all 0.2s;
  }
  .send-btn:hover { background: linear-gradient(135deg, #0077dd, #0055aa); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #1e3a5f; border-radius: 2px; }

  /* Theme toggle label */
  .theme-badge {
    font-size: 9px; color: #00d4ff; background: rgba(0,212,255,0.1);
    border: 1px solid rgba(0,212,255,0.3); border-radius: 4px;
    padding: 2px 6px; letter-spacing: 1px; margin-left: 8px;
  }

  /* page wrapper */
  .page-wrapper { padding: 20px; background: #1a1a2e; min-height: 100vh; }
  h2.page-title { color: #7dd3fc; font-size: 16px; margin-bottom: 6px; }
  .page-subtitle { color: #4a7fa5; font-size: 12px; margin-bottom: 20px; }
  .preview-frame {
    border: 1px solid #1e3a5f; border-radius: 12px; overflow: hidden;
    height: 500px; box-shadow: 0 4px 32px rgba(0,0,0,0.5);
  }
</style>
</head>
<body>
<div class="page-wrapper">
  <h2 class="page-title">科技风（Tech Dark）完整界面预览</h2>
  <p class="page-subtitle">点击下方预览区域内容，或在终端告诉我需要调整的地方</p>

  <div class="preview-frame">
    <div class="app">
      <!-- Header -->
      <div class="header">
        <div class="header-left">
          <span class="header-logo">⚡</span>
          <span class="header-title">校园网流量分析助手</span>
          <span class="theme-badge">TECH</span>
        </div>
        <div class="header-right">
          <div class="icon-btn active" title="切换科技风/简明风">🌙</div>
          <div class="icon-btn" title="设置">⚙</div>
        </div>
      </div>

      <!-- Body -->
      <div class="body">
        <!-- Sidebar -->
        <div class="sidebar">
          <div class="sidebar-top">
            <button class="new-btn">＋ &nbsp;新对话</button>
          </div>
          <div class="session-list">
            <div class="session-item active">
              <div class="session-title">分析出口线路流量分布</div>
              <div class="session-time">今天 14:30</div>
            </div>
            <div class="session-item">
              <div class="session-title">查看用户数量趋势</div>
              <div class="session-time">昨天 09:12</div>
            </div>
            <div class="session-item">
              <div class="session-title">流量异常检测报告</div>
              <div class="session-time">5月8日 16:44</div>
            </div>
          </div>
        </div>

        <!-- Main -->
        <div class="main">
          <div class="chat">
            <!-- User msg -->
            <div class="msg-user">
              <div class="bubble-user">分析昨天各出口线路的流量分布</div>
            </div>
            <!-- Progress -->
            <div class="msg-progress">
              <div class="spinner" style="border-top-color:#00d4ff; animation: none; border-color: #1e3a5f; border-top-color: #00d4ff;"></div>
              <span class="progress-text">正在查询数据库...</span>
            </div>
            <!-- Result -->
            <div class="result-card">
              <div class="insight-text">昨日各出口线路中，电信出口流量最高（38.2 Gbps），移动出口次之，联通出口最低，存在明显不均衡。</div>
              <div class="chart-label">TRAFFIC BY ISP — 2025-05-09</div>
              <div class="fake-chart">
                <div class="bar" style="height:72%"></div>
                <div class="bar" style="height:88%"></div>
                <div class="bar" style="height:45%"></div>
                <div class="bar" style="height:100%"></div>
                <div class="bar" style="height:62%"></div>
                <div class="bar" style="height:55%"></div>
                <div class="bar" style="height:78%"></div>
              </div>
              <div class="chart-axis"></div>
              <div class="chart-labels">
                <div class="chart-label-x">电信</div>
                <div class="chart-label-x">移动</div>
                <div class="chart-label-x">联通</div>
                <div class="chart-label-x">教育网</div>
                <div class="chart-label-x">国际</div>
                <div class="chart-label-x">IPv6</div>
                <div class="chart-label-x">其他</div>
              </div>
            </div>
            <!-- Clarify -->
            <div class="msg-assistant">
              <div class="bubble-assistant">需要进一步分析某条线路的时段分布吗？</div>
            </div>
          </div>

          <!-- Input -->
          <div class="input-bar">
            <div class="input-wrap">
              <input class="input-field" placeholder="输入分析问题，例如：分析昨天各出口线路的流量分布" readonly>
            </div>
            <button class="send-btn">→</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// inject helper if available
</script>
</body>
</html>
